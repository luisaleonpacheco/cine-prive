<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Privé - Premium</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #000000; color: #FFFFFF; min-height: 100vh; overflow-x: hidden; }

        /* PANTALLA DE INICIO (HOME) */
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #000000;
            gap: 30px;
            padding: 20px;
        }
        .home-screen h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: #E5E5E5; text-align: center; }
        .card-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .mode-card {
            width: 220px;
            height: 150px;
            background-color: #050505;
            border: 1px solid #111111;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-card:hover { background-color: #111111; border-color: #333333; transform: scale(1.05); }
        .mode-card span { font-size: 2.2rem; margin-bottom: 10px; }
        .mode-card p { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }

        /* INTERFAZ DEL REPRODUCTOR PRINCIPAL */
        .main-interface { display: none; height: 100vh; width: 100%; flex-direction: row; }
        .player-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; background-color: #000000; position: relative; }
        
        /* Botón para volver al Home */
        .btn-back {
            position: absolute; top: 15px; left: 20px; background: #050505; border: 1px solid #222;
            color: #fff; padding: 10px 15px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; z-index: 10;
        }
        .btn-back:hover { background: #111; }

        /* MAQUETACIÓN PARA OCUPAR LA PANTALLA GIGANTE EN PC */
        #drive-player-wrapper { 
            width: 100%; 
            height: 80%; 
            max-width: 1100px; 
            display: none; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background: #000;
        }
        
        /* Contenedor Responsive Proporcional 16:9 Nativo */
        .video-responsive-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* Forzamos al iframe de Drive a ocupar todo el espacio central */
        .video-responsive-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100% !important; 
            height: 100% !important; 
            border: none;
        }
        
        /* Contenedor para TV en Vivo */
        #live-player-wrapper { width: 100%; height: 80%; max-width: 1100px; display: none; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .video-js { width: 100% !important; height: 100% !important; }

        /* BARRA LATERAL ESCRITORIO */
        .sidebar { width: 320px; background-color: #050505; border-left: 1px solid #111111; display: flex; flex-direction: column; padding: 30px 20px; height: 100vh; }
        .sidebar h2 { font-size: 1.1rem; font-weight: 400; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; color: #E5E5E5; }
        
        /* Buscador inteligente */
        .search-box {
            width: 100%; padding: 10px; background: #0A0A0A; border: 1px solid #222; border-radius: 6px;
            color: #fff; margin-bottom: 20px; font-size: 0.9rem; display: none;
        }
        .search-box:focus { border-color: #555; outline: none; }

        .playlist-wrapper { flex: 1; overflow-y: auto; }
        .playlist { list-style: none; }
        .playlist-item { padding: 12px 15px; background-color: #0A0A0A; border-radius: 6px; margin-bottom: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; border: 1px solid transparent; display: flex; align-items: center; gap: 10px; }
        .playlist-item:hover { background-color: #111111; border-color: #222222; }
        .playlist-item.active { background-color: #FFFFFF; color: #000000; font-weight: 500; }

        /* =========================================================
           🌍 ADAPTACIÓN RESPONSIVE AUTOMÁTICA (MÓVILES Y TABLETS)
           ========================================================= */
        @media (max-width: 991px) {
            body { overflow-y: auto; }
            .main-interface { flex-direction: column; height: auto; }
            .player-container { width: 100%; height: auto; padding: 70px 10px 10px 10px; }
            
            #drive-player-wrapper, #live-player-wrapper { 
                height: auto; 
                aspect-ratio: 16/9; 
            }
            .video-responsive-container { padding-bottom: 56.25%; height: 0; }
        }
    </style>
</head>
<body>

    <div id="home-view" class="home-screen">
        <h1>Selecciona un espacio</h1>
        <div class="card-container">
            <div class="mode-card" onclick="switchMode('tv')">
                <span>📺</span>
                <p>TV en Vivo</p>
            </div>
            <div class="mode-card" onclick="switchMode('novelas')">
                <span>🎬</span>
                <p>Mis Novelas</p>
            </div>
        </div>
    </div>

    <div id="interface-view" class="main-interface">
        <div class="player-container">
            <button class="btn-back" onclick="goHome()">◀ Volver</button>
            
            <div id="drive-player-wrapper">
                <div class="video-responsive-container" id="player-target"></div>
            </div>
            
            <div id="live-player-wrapper">
                <video id="live-player" class="video-js vjs-big-play-centered" controls preload="auto"></video>
            </div>
        </div>

        <div class="sidebar">
            <h2 id="sidebar-title">Contenido</h2>
            <input type="text" id="search" class="search-box" placeholder="Buscar canal..." onkeyup="filterChannels()">
            
            <div class="playlist-wrapper">
                <ul id="playlist-content" class="playlist">
                    </ul>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script>
        // --- SISTEMA DE PROTECCIÓN ---
        const CLAVE_SECRETA = "lunita"; 
        let acceso = prompt("Introduce la clave de acceso privado:");
        if (acceso !== CLAVE_SECRETA) {
            document.body.innerHTML = "<h1 style='color: #111; text-align: center; margin-top: 20%; font-weight: 300;'>404 - Not Found</h1>";
            window.stop();
        }

        // --- BASE DE DATOS ULTRA LIMPIA (Solo pones el ID de tu Drive) ---
        const listaNovelas = [
            { nombre: "🎬 Capítulo 1", id: "1Ts09UULFFiukcufD22hMs4ors1YPXWMA" },
            { nombre: "🎬 Capítulo 2", id: "1NY8h161GLE4aIyU8is7_gHwPKgb4hZBn" }
        ];

                   // --- ENLACES PROXY DE TUS CANALES FAVORITOS (LIBRES DE CORS) ---
        const listaCanales = [
            { nombre: "📺 12 TV Parma (Italia)", url: "https://5929b138b139d.streamlock.net/12TVParma/livestream/playlist.m3u8" },
            { nombre: "🎬 13C Chile", url: "https://origin.dpsgo.com/ssai/event/GI-9cp_bT8KcerLpZwkuhw/master.m3u8" },
            { nombre: "🏛️ History Channel (Señal Alterna)", url: "https://cvi.cdn.rcs.net.ar/mnp/history_hls/playlist.m3u8" },
            { nombre: "🎥 Tlnovelas (Señal Alterna)", url: "https://linear-403.frequency.stream/mt/studio/403/hls/master/playlist.m3u8" }
        ];

        let modoActual = "";
        let vjsPlayer = videojs('live-player');

        // --- NAVEGACIÓN ---
        function switchMode(mode) {
            modoActual = mode;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('interface-view').style.display = 'flex';
            
            const title = document.getElementById('sidebar-title');
            const search = document.getElementById('search');
            
            if (mode === 'novelas') {
                title.innerText = "Mis Novelas";
                search.style.display = 'none';
                buildList(listaNovelas, 'drive');
            } else {
                title.innerText = "TV en Vivo";
                search.style.display = 'block';
                buildList(listaCanales, 'live');
            }
        }

        function goHome() {
            clearDrivePlayer();
            vjsPlayer.reset();
            
            document.getElementById('drive-player-wrapper').style.display = 'none';
            document.getElementById('live-player-wrapper').style.display = 'none';
            
            document.getElementById('home-view').style.display = 'flex';
            document.getElementById('interface-view').style.display = 'none';
        }

        function clearDrivePlayer() {
            document.getElementById('player-target').innerHTML = "";
        }

        // --- RECONSTRUCTOR DE MENÚS ---
        function buildList(items, type) {
            const container = document.getElementById('playlist-content');
            container.innerHTML = "";
            
            items.forEach((item) => {
                const li = document.createElement('li');
                li.className = "playlist-item";
                li.innerText = item.nombre;
                li.onclick = function() {
                    playMedia(item, type, this);
                };
                container.appendChild(li);
            });
        }

       // --- REPRODUCTOR HÍBRIDO DEFINITIVO (NOVELAS VS TRANSMISIONES M3U8) ---
        function playMedia(item, type, element) {
            // Reset absoluto de contenedores
            document.getElementById('player-target').innerHTML = "";
            vjsPlayer.reset();
            document.getElementById('drive-player-wrapper').style.display = 'none';
            document.getElementById('live-player-wrapper').style.display = 'none';

            document.querySelectorAll('.playlist-item').forEach(i => i.classList.remove('active'));
            if(element) element.classList.add('active');

            if (type === 'drive') {
                // MODO NOVELA INTACTO (El que se ve gigante y te funciona)
                document.getElementById('drive-player-wrapper').style.display = 'block';
                const targetDiv = document.getElementById('player-target');
                targetDiv.innerHTML = `<iframe src="https://drive.google.com/file/d/${item.id}/preview" allow="autoplay" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>`;
                
            } else {
                // MODO TV EN VIVO (Para procesar los flujos m3u8 directo en Video.js)
                document.getElementById('live-player-wrapper').style.display = 'block';
                vjsPlayer.src({ src: item.url, type: 'application/x-mpegURL' });
                vjsPlayer.play().catch(function(error) {
                    console.log("Sintonizando flujo en directo...");
                });
            }
        }

        // --- BUSCADOR ---
        function filterChannels() {
            const text = document.getElementById('search').value.toLowerCase();
            const items = document.querySelectorAll('.playlist-item');
            
            items.forEach(item => {
                if(item.innerText.toLowerCase().includes(text)) {
                    item.style.display = "flex";
                } else {
                    item.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
